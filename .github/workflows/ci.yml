---
name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions: {}
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      # Monitors outbound network calls and can enforce egress policy. Audit mode
      # records unexpected traffic without blocking while CI hardening is tuned.
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Check spelling
        uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14  # v1.48.0

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy --target wasm32-unknown-unknown
          rustup default stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Log tool versions
        run: |
          rustc --version
          cargo --version

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

      - name: Check WASM build
        run: cargo check --locked -p meerkat-lib --target wasm32-unknown-unknown --all-features

      # TODO: Re-enable `multiple_message` test after Issue 73 is resolved
      - name: Run tests
        run: cargo test --locked --workspace --all-features -- --skip multiple_message

      - name: Smoke test CLI
        run: cargo run --locked -p meerkat -- --help
